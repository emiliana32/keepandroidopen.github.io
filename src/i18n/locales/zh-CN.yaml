# [en] social_callout_bluesky_4: "Google's proposed workaround for installing unverified apps: 9 steps, a 24-hour wait, delivered through Play Services (which Google can change at any time without consent). It exists only as a blog post. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_4: "Google 说装未验证应用还有招：九步操作、等二十四小时、走 Play 服务（Google 想改就改，不用问你）。却只存在于一篇博文里。 @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_5: "The EFF warns that Google's developer verification creates \"a pathway to censorship.\" Developers in restrictive countries, anonymous open-source contributors, and privacy tool maintainers are among those most affected. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_5: "EFF 警告说，Google 的开发者验证就是“通往审查的路”。管控严格国家的开发者、匿名开源贡献者、隐私工具的维护者，都会被影响。 @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_6: "Google's plan to block unverified apps is a 'rug pull' on the 3 billion people who chose Android for its openness. Don't let them turn your phone into a walled garden. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_6: "30 亿人当初选 Android 就因为它开放，现在 Google 要屏蔽未验证应用，就是冲他们“割韭菜跑路”。别让他们把你的手机变成封闭的后花园。 @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_7: "Ownership means control. If Google can block any app on your phone, you don't really own it. Join the 100,000+ people fighting to keep Android open. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_7: "拥有就是说了算。Google 能屏蔽你手机上任何应用的话，那你其实也没真的拥有它。10 万多人正在为 Android 的开放发声，加入我们。 @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_8: "Mandatory ID registration for every app developer? This is a dream for censors and a nightmare for privacy. Protect the open web and open mobile. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "每个应用开发者都得实名注册？搞审查的人做梦都笑醒，关注隐私的人睡不着觉。保护我们开放的网络和开放的手机平台。 @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_9: "Sideloading shouldn't require a 24-hour waiting period and a 9-step gauntlet. Google's 'advanced flow' is designed to fail. Keep Android Open! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "侧载哪需要等二十四小时、过九关。Google 的“高级流程”就是设计来劝退的。让 Android 保持开放！ @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_10: "From F-Droid to independent devs, the entire Android ecosystem is under threat from Google's new mandatory registration decree. See why 67+ orgs are saying no: {url}"
social_callout_bluesky_10: "从 F-Droid 到独立开发者，整个 Android 生态都被 Google 这道强制注册令架在火上烤。看看 67 家以上的组织为啥说不：{url}"
# [en] social_callout_mastodon_1: "Starting September 2026, Google will require every Android app developer to register centrally, provide government ID, and submit signing keys. Apps from unregistered developers will be blocked on all certified devices worldwide. This threatens F-Droid, open-source distribution, and user autonomy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_1: "从 2026 年 9 月起，Google 要每个 Android 应用开发者统一注册、交身份证、提供签名密钥证明。没注册的，应用在全球所有认证设备上都装不了。这威胁的是 F-Droid、开源分发和用户自主权。 @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_2: "Google's Android Developer Verification program requires government ID, signing keys, and a fee for any developer who wants their software installable on Android. The EFF calls app gatekeeping \"a pathway to censorship.\" over 67 organizations have signed an open letter opposing it. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
