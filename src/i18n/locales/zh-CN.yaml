# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "从 2026 年 9 月起，Google 要求每个 Android 应用开发者在 Google 那儿统一注册、交身份证件，才能让软件装到任何设备上。所有应用都跑不掉，不只是 Play Store 里的。已经有 67 家以上的组织签了公开信反对。{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "Android 开放了将近二十年，这就是它跟别人不一样的地方。现在 Google 要所有 Android 应用都强制注册开发者，连 F-Droid 这种第三方商店分发的也算。EFF、FSF、Tor 项目等几十家组织都已经表达了严重担忧。{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Google 这套开发者验证，等于让一家公司能屏蔽全球任何有认证的 Android 设备上、任何开发者写的任何应用。受影响的是独立开发者、开源项目和你对自己设备上软件的控制权。{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid 估计，按 Google 新规来，自家 85% 的开源应用都可能没法正常分发。要身份证、要签名密钥证明这一条，把匿名贡献者、被制裁国家的开发者和靠志愿者撑着的项目，都挡在门外了。{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Google 说侧载未验证应用还有“高级流程”：九步操作、强制等二十四小时，全程走 Google Play 服务。所有的承诺全部来自一篇博客文章。到现在为止，这套流程连个测试版都没发。{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps—even those distributed outside the Play Store—creates a central point of control and potential censorship for 3 billion devices. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "数字主权岌岌可危。Google 要所有 Android 应用都强制注册开发者，连 Play Store 以外分发的也不放过，这就给 30 亿台设备装上了一个开关，也给审查留了条路。{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: "“Keep Android Open”行动已经得到全球 67 家以上组织的支持。我们反对 Google 这套：开发者没注册、没交身份证，应用就给你屏蔽掉。读读公开信：{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: "对人们已经买到手的硬件回头改规矩，这先例开得很危险。Google 的强制开发者验证夺走了用户的选择权，把人硬塞进一个被管控的生态。{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid 和 EFF 都拉响警报了：Google 的开发者验证对第三方应用分发就是“致命威胁”。Android 是靠开源生态搭起来的，我们必须守住。{url} #KeepAndroidOpen"
# [en] social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Google 越来越想当守门人，社区也开始反击。你的设备应该是属于你的东西，不是一台随时可能被追加限制的设备。加入我们：{url} #KeepAndroidOpen"
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_1: "从 2026 年 9 月起，开发者没注册、没交身份证的 Android 应用，Google 统统屏蔽。所有应用都中招，不只是 Play Store 的。F-Droid 管这叫“致命威胁”。 @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
